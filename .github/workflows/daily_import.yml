name: Import quotidien des prix Poomby
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install wget
        run: sudo apt-get install -y wget
      - name: Install dependencies
        run: pip install il-supermarket-scraper openai supabase requests
      - name: Import data to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/import_kaggle.py
      - name: Done
        run: echo "✅ Import Poomby terminé - $(date)"